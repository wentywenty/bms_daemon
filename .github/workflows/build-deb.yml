name: Build Roboto BMS Deb Package

on:
  push:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-22.04
          - arch: arm64
            os: ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache dpkg-dev debhelper devscripts \
            libspdlog-dev libfmt-dev \
            python3-dev pybind11-dev

      - name: Build deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mv ../*.deb .

          VERSION=$(dpkg-parsechangelog -S Version | cut -d'-' -f1 || echo "unknown")
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboto-bms-v${{ env.PKG_VERSION }}-${{ matrix.arch }}
          path: "*.deb"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
